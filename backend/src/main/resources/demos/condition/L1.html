<!-- motif-lab gold: condition L1 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>条件 L1</title>
  <style>
    body {
      min-height: 100vh; margin: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.2rem;
      font-family: "Microsoft YaHei", sans-serif; background: #f5f5f5;
    }
    .row { display: flex; gap: 2rem; align-items: center; }
    .path {
      width: 110px; height: 80px; border-radius: 12px; display: flex;
      align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem;
      border: 3px solid #ccc; opacity: .35; transition: .4s;
    }
    .path.on { opacity: 1; transform: scale(1.08); border-color: #1976d2; }
    .umb { background: #b3e5fc; }
    .sun { background: #fff9c4; }
    .weather { font-size: 2rem; min-height: 2.5rem; }
  </style>
</head>
<body>
  <div class="weather" id="w">☁️</div>
  <div class="row">
    <div class="path umb" id="p1">伞路</div>
    <div class="path sun" id="p2">阳光路</div>
  </div>
  <script>
    const w = document.getElementById('w');
    const p1 = document.getElementById('p1');
    const p2 = document.getElementById('p2');
    async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    async function run() {
      while (true) {
        w.textContent = '🌧️ 下雨';
        p1.classList.add('on'); p2.classList.remove('on');
        await sleep(2000);
        w.textContent = '☀️ 晴天';
        p2.classList.add('on'); p1.classList.remove('on');
        await sleep(2000);
      }
    }
    run();
  </script>
</body>
</html>
