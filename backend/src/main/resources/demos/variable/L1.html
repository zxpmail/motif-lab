<!-- motif-lab gold: variable L1 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>变量 L1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.5rem;
      background: #fafafa; font-family: "Microsoft YaHei", sans-serif;
    }
    .box {
      width: 140px; height: 110px; border: 5px solid #6d4c41; border-radius: 10px;
      background: #efebe9; display: flex; align-items: center; justify-content: center;
      font-size: 3rem; font-weight: 800; color: #ef6c00;
    }
    .name { font-size: 1.4rem; font-weight: 700; }
  </style>
</head>
<body>
  <div class="name">苹果数</div>
  <div class="box" id="val">?</div>
  <script>
    const val = document.getElementById('val');
    async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    async function run() {
      while (true) {
        val.textContent = '?'; await sleep(1400);
        val.textContent = '3'; await sleep(1800);
        val.textContent = '5'; await sleep(2200);
      }
    }
    run();
  </script>
</body>
</html>
