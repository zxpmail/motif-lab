<!-- motif-lab gold: variable L0 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>变量 L0</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      background: linear-gradient(160deg, #fff5e6, #e8f5e9);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif; color: #333;
    }
    .stage {
      width: 300px; height: 240px; background: #fff; border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08); position: relative; overflow: hidden;
    }
    .box {
      position: absolute; left: 90px; top: 70px; width: 120px; height: 100px;
      border: 4px solid #8d6e63; border-radius: 8px; background: #efebe9;
    }
    .label {
      position: absolute; left: 70px; top: 28px; padding: 4px 10px;
      background: #ffecb3; border-radius: 6px; font-weight: 700; font-size: 1.1rem;
    }
    .apples { position: absolute; inset: 12px; display: flex; flex-wrap: wrap; gap: 6px; align-content: center; justify-content: center; }
    .apple {
      width: 28px; height: 28px; border-radius: 50%; background: #e53935;
      opacity: 0; transform: scale(.5); transition: .35s ease;
    }
    .apple.on { opacity: 1; transform: scale(1); }
    .value {
      position: absolute; right: 16px; top: 16px; font-size: 2.5rem; font-weight: 800; color: #ef6c00;
      min-width: 2rem; text-align: center;
    }
    .narration { font-size: 1.15rem; color: #555; min-height: 1.5rem; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="label">苹果数</div>
    <div class="value" id="val">?</div>
    <div class="box"><div class="apples" id="apples"></div></div>
  </div>
  <p class="narration" id="say">变量像贴了名字的盒子</p>
  <script>
    const apples = document.getElementById('apples');
    const val = document.getElementById('val');
    const say = document.getElementById('say');
    for (let i = 0; i < 5; i++) {
      const a = document.createElement('div');
      a.className = 'apple';
      a.id = 'a' + i;
      apples.appendChild(a);
    }
    function show(n, text) {
      say.textContent = text;
      val.textContent = n;
      for (let i = 0; i < 5; i++) {
        document.getElementById('a' + i).classList.toggle('on', i < n);
      }
    }
    async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    async function run() {
      while (true) {
        show('?', '变量像贴了名字的盒子');
        await sleep(1200);
        show(3, '放进 3 个苹果 → 值变成 3');
        await sleep(1600);
        show(5, '再改一次 → 值变成 5（名字还叫苹果数）');
        await sleep(2000);
      }
    }
    run();
  </script>
</body>
</html>
