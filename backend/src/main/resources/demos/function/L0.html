<!-- motif-lab gold: function L0 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>函数 L0</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      background: linear-gradient(160deg, #e3f2fd, #f3e5f5);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif; color: #333;
    }
    .stage {
      width: 340px; height: 240px; background: #fff; border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08); position: relative; overflow: hidden;
      padding: 16px;
    }
    .title {
      text-align: center; font-weight: 800; font-size: 1.2rem;
      background: #ffe082; border-radius: 8px; padding: 6px 10px; margin-bottom: 14px;
    }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; height: 140px; }
    .slot {
      width: 88px; min-height: 72px; border: 3px dashed #90a4ae; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; text-align: center;
      font-weight: 700; font-size: 1rem; padding: 8px; background: #fafafa;
    }
    .slot.filled { border-style: solid; border-color: #42a5f5; background: #e3f2fd; }
    .machine {
      width: 100px; height: 100px; border-radius: 14px; background: #7e57c2; color: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-weight: 800; gap: 4px; box-shadow: 0 4px 12px rgba(126,87,194,.35);
      transition: transform .25s;
    }
    .machine.pulse { transform: scale(1.08); }
    .machine small { font-weight: 600; font-size: .75rem; opacity: .9; }
    .arrow { font-size: 1.4rem; color: #78909c; }
    .narration { font-size: 1.15rem; color: #555; min-height: 1.5rem; text-align: center; max-width: 360px; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="title">函数：问好机</div>
    <div class="row">
      <div class="slot" id="in">输入</div>
      <div class="arrow">→</div>
      <div class="machine" id="fn">问好机<small>固定步骤</small></div>
      <div class="arrow">→</div>
      <div class="slot" id="out">输出</div>
    </div>
  </div>
  <p class="narration" id="say">函数像一台有名字的机器</p>
  <script>
    const inn = document.getElementById('in');
    const out = document.getElementById('out');
    const fn = document.getElementById('fn');
    const say = document.getElementById('say');
    async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    async function call(name) {
      inn.className = 'slot filled';
      inn.textContent = name;
      out.className = 'slot';
      out.textContent = '…';
      say.textContent = '放进「' + name + '」→ 按下机器';
      await sleep(900);
      fn.classList.add('pulse');
      say.textContent = '固定步骤：前面加「你好，」';
      await sleep(1000);
      fn.classList.remove('pulse');
      out.className = 'slot filled';
      out.textContent = '你好，' + name;
      say.textContent = '吐出结果，同一台机器可再调用';
      await sleep(1800);
    }
    async function run() {
      while (true) {
        inn.className = 'slot'; inn.textContent = '输入';
        out.className = 'slot'; out.textContent = '输出';
        say.textContent = '函数像一台有名字的机器';
        await sleep(1200);
        await call('小红');
        await call('小刚');
      }
    }
    run();
  </script>
</body>
</html>
