<!-- motif-lab gold: function L1 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>函数 L1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.2rem;
      background: #fafafa; font-family: "Microsoft YaHei", sans-serif;
    }
    .line { display: flex; align-items: center; gap: 1rem; font-size: 1.5rem; font-weight: 700; }
    .box {
      min-width: 100px; padding: 12px 16px; border-radius: 10px; text-align: center;
      border: 4px solid #7e57c2; background: #ede7f6;
    }
    .fn { background: #7e57c2; color: #fff; border-color: #5e35b1; }
  </style>
</head>
<body>
  <div class="line">
    <div class="box" id="in">?</div>
    <span>→</span>
    <div class="box fn">问好</div>
    <span>→</span>
    <div class="box" id="out">?</div>
  </div>
  <script>
    const inn = document.getElementById('in');
    const out = document.getElementById('out');
    const names = ['小红', '小刚'];
    let i = 0;
    async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    async function run() {
      while (true) {
        const n = names[i % names.length];
        i++;
        inn.textContent = n;
        out.textContent = '…';
        await sleep(1000);
        out.textContent = '你好，' + n;
        await sleep(1800);
      }
    }
    run();
  </script>
</body>
</html>
